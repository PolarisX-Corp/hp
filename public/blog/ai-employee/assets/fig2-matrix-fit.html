<!-- style: paper + R2 pictogram -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  :root{
    --bg:#FAF9F5; --paper:#FFFFFF; --card:#FFFEFB; --border:#E4E1D6; --rule:#1B2233;
    --ink:#00063D; --body:#363C4D; --muted:#6B7388; --faint:#9AA1B5;
    --accent:#366EFF; --accent-d:#1841B8; --accent-bg:#EDF2FF; --deep:#000985;
    --neutral:#F1EFE8;
    --serif:"Hiragino Mincho ProN","YuMincho","Yu Mincho",serif;
    --sans:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1600px; height:900px; }
  body {
    font-family:var(--sans); background:var(--bg); color:var(--ink);
    padding:44px 60px 24px; display:flex; flex-direction:column;
  }
  .eyebrow { font-size:19px; font-weight:800; letter-spacing:.42em; color:var(--accent-d); }
  .title { font-family:var(--serif); font-size:47px; font-weight:700; letter-spacing:.01em; margin-top:10px; }
  .title .em { color:var(--accent); border-bottom:4px solid var(--accent); padding-bottom:2px; }
  .sub { font-size:22px; color:var(--muted); margin-top:12px; line-height:1.5; }
  .drule { margin-top:16px; border-top:2.5px solid var(--rule); border-bottom:1px solid var(--rule); height:5px; }

  .plot { flex:1; display:grid; grid-template-columns:58px 1fr; grid-template-rows:1fr 46px; margin-top:20px; }
  .yaxis { grid-column:1; grid-row:1; display:flex; flex-direction:column; align-items:center;
           justify-content:space-between; padding:4px 0; }
  .yaxis .hi, .yaxis .lo { font-family:var(--sans); font-size:19px; font-weight:800; color:var(--muted); }
  .yaxis .name { writing-mode:vertical-rl; font-family:var(--serif); font-size:23px; font-weight:700;
                 color:var(--ink); letter-spacing:.16em; }
  .grid { grid-column:2; grid-row:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:20px; padding-left:16px; }
  .corner { grid-column:1; grid-row:2; }
  .xaxis { grid-column:2; grid-row:2; display:flex; align-items:center; justify-content:space-between; padding:10px 16px 0 16px; }
  .xaxis .name { font-family:var(--serif); font-size:23px; font-weight:700; color:var(--ink); letter-spacing:.06em; }
  .xaxis .l, .xaxis .r { font-family:var(--sans); font-size:19px; font-weight:800; color:var(--muted); }

  .q { border:1px solid var(--border); border-radius:4px; padding:20px 26px; display:flex; flex-direction:column;
       background:var(--card); position:relative; }
  .qhead { display:flex; align-items:center; gap:14px; }
  .qic { width:46px; height:46px; flex-shrink:0; }
  .q .qlabel { font-family:var(--serif); font-size:24px; font-weight:700; }
  .q .qbody { font-family:var(--sans); font-size:21px; line-height:1.55; color:var(--body); margin-top:12px; }
  .q.soft .qlabel { color:var(--muted); }
  .q.neutral { background:var(--neutral); }
  .q.neutral .qlabel { color:var(--faint); }
  .q.hot { border:1px solid var(--accent); border-top:3px solid var(--accent); background:#F5F8FF; }
  .q.hot .qlabel { color:var(--accent-d); }
  .q.hot .qbody { color:var(--ink); }
  .q.hot .star { font-family:var(--sans); display:inline-block; font-size:19px; font-weight:800; color:#fff;
                 background:var(--accent); padding:5px 16px; border-radius:3px; margin-top:14px; align-self:flex-start; letter-spacing:.04em; }

  .brandbar { flex-shrink:0; margin-top:18px; padding-top:14px; border-top:1px solid var(--border);
              display:flex; align-items:center; justify-content:space-between; }
  .brandbar .tag { font-size:22px; color:var(--muted); font-weight:600; letter-spacing:.02em; }
  .brandbar .logo { height:38px; width:auto; opacity:.95; }
</style></head>
<body>
  <div class="title">AI社員が<span class="em">効く業務</span>・人の確認が要る業務</div>
  <div class="sub">「定型的か」×「社内文脈への依存」で見極める。効くのは右上——定型で、社内の文脈を参照する領域</div>
  <div class="drule"></div>

  <div class="plot">
    <div class="yaxis">
      <span class="hi">高</span>
      <span class="name">社内文脈への依存</span>
      <span class="lo">低</span>
    </div>
    <div class="grid">
      <!-- 左上: 非定型 × 文脈高 -->
      <div class="q soft">
        <div class="qhead">
          <svg class="qic" viewBox="0 0 40 40" fill="none" stroke="#6B7388" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <line x1="20" y1="7" x2="20" y2="30"/>
            <line x1="9" y1="13" x2="31" y2="13"/>
            <circle cx="20" cy="9.5" r="1.7" fill="#6B7388" stroke="none"/>
            <line x1="9" y1="13" x2="6" y2="20"/><line x1="9" y1="13" x2="12" y2="20"/><path d="M6 20 Q9 25 12 20"/>
            <line x1="31" y1="13" x2="28" y2="20"/><line x1="31" y1="13" x2="34" y2="20"/><path d="M28 20 Q31 25 34 20"/>
            <line x1="13" y1="30" x2="27" y2="30"/>
          </svg>
          <div class="qlabel">人の確認が要る</div>
        </div>
        <div class="qbody">経営判断など、正解が一つに定まらない領域。AIは下調べ止まり、決めるのは人。</div>
      </div>
      <!-- 右上: 定型 × 文脈高 -->
      <div class="q hot">
        <div class="qhead">
          <svg class="qic" viewBox="0 0 40 40" fill="none" stroke="#366EFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8" y="12" width="22" height="17" rx="4"/>
            <line x1="19" y1="12" x2="19" y2="6"/><circle cx="19" cy="5" r="1.7" fill="#366EFF" stroke="none"/>
            <circle cx="15" cy="20.5" r="1.9" fill="#366EFF" stroke="none"/><circle cx="23" cy="20.5" r="1.9" fill="#366EFF" stroke="none"/>
            <line x1="14" y1="25" x2="24" y2="25"/>
            <polyline points="27,29 31,34 38,24"/>
          </svg>
          <div class="qlabel">◎ 効きやすい</div>
        </div>
        <div class="qbody">問い合わせの一次対応・社内ナレッジ検索・提案書／議事録の下書き・定型の照合。</div>
        <div class="star">AI社員の主戦場</div>
      </div>
      <!-- 左下: 非定型 × 文脈低 -->
      <div class="q soft">
        <div class="qhead">
          <svg class="qic" viewBox="0 0 40 40" fill="none" stroke="#6B7388" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="15" cy="14" r="5"/>
            <path d="M6 31 v-3 a9 9 0 0 1 18 0 v3"/>
            <circle cx="28.5" cy="15.5" r="4.2"/>
            <path d="M24 31 v-2.5 a8 8 0 0 1 13 0 v2.5"/>
          </svg>
          <div class="qlabel">人の領域</div>
        </div>
        <div class="qbody">対人の機微が決め手の交渉、法的・倫理的に最終責任が問われる領域。</div>
      </div>
      <!-- 右下: 定型 × 文脈低 -->
      <div class="q neutral">
        <div class="qhead">
          <svg class="qic" viewBox="0 0 40 40" fill="none" stroke="#9AA1B5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="20" cy="20" r="6.5"/>
            <line x1="20" y1="7" x2="20" y2="11.5"/><line x1="20" y1="28.5" x2="20" y2="33"/>
            <line x1="7" y1="20" x2="11.5" y2="20"/><line x1="28.5" y1="20" x2="33" y2="20"/>
            <line x1="11" y1="11" x2="14" y2="14"/><line x1="26" y1="26" x2="29" y2="29"/>
            <line x1="29" y1="11" x2="26" y2="14"/><line x1="14" y1="26" x2="11" y2="29"/>
          </svg>
          <div class="qlabel">汎用ツールで足りる</div>
        </div>
        <div class="qbody">単純な定型処理は、RPAやチャットボットでも対応できる。AI社員でなくてよい。</div>
      </div>
    </div>
    <div class="corner"></div>
    <div class="xaxis">
      <span class="l">非定型</span>
      <span class="name">業務が定型的か</span>
      <span class="r">定型</span>
    </div>
  </div>

  <div class="brandbar">
    <div class="tag">AIを会社のOSにする。</div>
    <img class="logo" src="PolarisX_wordmark.svg" alt="PolarisX">
  </div>
</body></html>
