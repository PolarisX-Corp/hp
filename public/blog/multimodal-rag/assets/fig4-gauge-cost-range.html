<!-- style: flat (基調) — gauge/スケール帯: 導入費用の目安（執筆時点の報告値・断定回避のラベル必須） -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  :root{
    --bg:#F7F8FB; --card:#FFFFFF; --border:#E2E5EE;
    --ink:#00063D; --body:#363C4D; --muted:#6B7388;
    --accent:#366EFF; --accent-d:#1841B8; --accent-bg:#EAF0FF; --accent-bd:#ADC3FF;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:1024px; }
  body { font-family:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
         background:var(--bg); color:var(--ink); padding:44px 50px 26px; display:flex; flex-direction:column; }
  .title { font-size:30px; font-weight:800; letter-spacing:-.01em; line-height:1.3; }
  .title .em { color:var(--accent); }
  .sub { font-size:18px; color:var(--muted); font-weight:600; margin-top:10px; line-height:1.5; }

  .stage { flex:1; display:flex; flex-direction:column; justify-content:space-evenly; gap:18px; margin-top:8px; }
  .row { display:flex; flex-direction:column; gap:10px; }
  .rname .n { font-size:30px; font-weight:800; }
  .rname .d { font-size:18px; color:var(--muted); font-weight:600; margin-top:2px; }
  .track { position:relative; height:68px; background:var(--card); border:1.5px solid var(--border); border-radius:999px; }
  .band { position:absolute; top:6px; bottom:6px; border-radius:999px;
          background:linear-gradient(90deg,var(--accent-bg),var(--accent)); opacity:.85;
          display:flex; align-items:center; justify-content:center; }
  .band span { font-size:26px; font-weight:800; color:#fff; text-shadow:0 1px 3px rgba(24,65,184,.4); white-space:nowrap; padding:0 18px; }
  .b1 { left:2%;  width:36%; }
  .b2 { left:30%; width:42%; }
  .b3 { left:60%; width:38%; }

  .notes { display:flex; flex-direction:column; gap:12px; margin-top:6px; }
  .note { background:var(--accent-bg); border:1px solid var(--accent-bd); border-radius:12px;
          padding:16px 22px; font-size:21px; font-weight:700; color:var(--accent-d); line-height:1.45; }
  .note.warn { background:#FFF3E4; border-color:#F2C48D; color:#8A3B00; }

  .brandbar { flex-shrink:0; margin-top:18px; padding-top:13px; border-top:1px solid var(--border);
              display:flex; align-items:center; justify-content:space-between; }
  .brandbar .tag { font-size:21px; color:var(--muted); font-weight:600; }
  .brandbar .logo { height:36px; width:auto; opacity:.95; }
</style></head>
<body>
  <div class="title">導入費用の目安 — <span class="em">構成で桁が変わる（執筆時点の報告値）</span></div>
  <div class="sub">単一の相場では語れない。金額より先に「どの文書を・誰が・何のために引くのか」の絞り込みが費用を決める</div>

  <div class="stage">
    <div class="row">
      <div class="rname"><div class="n">SaaS型</div><div class="d">既製サービスを利用</div></div>
      <div class="track"><div class="band b1"><span>月額 数万円〜</span></div></div>
    </div>
    <div class="row">
      <div class="rname"><div class="n">小規模構築</div><div class="d">1部門・1用途の個別構築</div></div>
      <div class="track"><div class="band b2"><span>100〜500万円程度</span></div></div>
    </div>
    <div class="row">
      <div class="rname"><div class="n">大規模構築・運用</div><div class="d">全社横断・継続運用まで</div></div>
      <div class="track"><div class="band b3"><span>年間 数百万〜数千万円規模</span></div></div>
    </div>
    <div class="notes">
      <div class="note warn">いずれも執筆時点（2026年7月）の<b>二次情報による報告値</b>。要件しだいで大きく変動するため断定できない</div>
    </div>
  </div>

  <div class="brandbar">
    <div class="tag">AIを会社のOSにする。</div>
    <img class="logo" src="../../../brand/PolarisX_wordmark.svg" alt="PolarisX">
  </div>
</body></html>
