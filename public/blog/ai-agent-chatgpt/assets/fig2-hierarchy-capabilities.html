<!-- style: flat + R3 illustration (text-free bg) + HTML labels -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  :root{
    --bg:#F7F8FB; --card:#FFFFFF; --border:#E2E5EE;
    --ink:#00063D; --body:#363C4D; --muted:#6B7388; --faint:#9AA1B5;
    --accent:#366EFF; --accent-d:#1841B8; --accent-bg:#EAF0FF; --accent-bd:#ADC3FF;
    --deep:#000985; --tint:#F2F6FF;
    --sans:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1600px; height:900px; }
  body {
    font-family:var(--sans); background:var(--bg); color:var(--ink);
    padding:40px 56px 24px; display:flex; flex-direction:column;
  }
  .title { font-size:46px; font-weight:800; letter-spacing:-.02em; }
  .title .em { color:var(--accent); }
  .sub { font-size:23px; color:var(--muted); margin-top:10px; }

  .tree { flex:1; display:flex; flex-direction:column; align-items:center; margin-top:18px; }
  .topnode { display:flex; align-items:center; gap:16px; background:var(--deep); color:#fff;
             border-radius:16px; padding:20px 40px; box-shadow:0 12px 30px rgba(0,9,133,.22); }
  .topnode .ci { width:40px; height:40px; }
  .topnode .tt { font-size:32px; font-weight:800; letter-spacing:.01em; }

  .connect { width:100%; height:64px; }

  .branches { width:100%; display:grid; grid-template-columns:repeat(4,1fr); gap:24px; flex:1; }
  .b { background:var(--card); border:2px solid var(--border); border-top:5px solid var(--accent);
       border-radius:18px; padding:26px 24px; display:flex; flex-direction:column; align-items:center;
       box-shadow:0 8px 24px rgba(0,9,133,.06); }
  .b .icon { width:80px; height:80px; border-radius:20px; background:var(--tint); display:flex; align-items:center; justify-content:center; }
  .b .icon svg { width:46px; height:46px; }
  .b .verb { font-size:30px; font-weight:800; color:var(--accent-d); margin-top:18px; }
  .b .role { font-size:19px; font-weight:700; color:var(--muted); margin-top:4px; }
  .b .ex { font-size:21px; font-weight:600; color:var(--body); line-height:1.5; margin-top:16px; text-align:center;
           border-top:1px solid var(--border); padding-top:16px; }
  .b .ex b { color:var(--ink); font-weight:800; }

  .foot { text-align:center; font-size:21px; font-weight:600; color:var(--muted); margin-top:20px; }
  .foot b { color:var(--accent-d); font-weight:800; }

  .brandbar { flex-shrink:0; margin-top:18px; padding-top:14px; border-top:1px solid var(--border);
              display:flex; align-items:center; justify-content:space-between; }
  .brandbar .tag { font-size:22px; color:var(--muted); font-weight:600; letter-spacing:.02em; }
  .brandbar .logo { height:38px; width:auto; opacity:.95; }
</style></head>
<body>
  <div class="title">ChatGPTエージェントで<span class="em">できること</span></div>
  <div class="sub">「調べる・作る・つなぐ・実行する」の4系統。人が一つずつ指示せず、AIが目的から組み合わせる</div>

  <div class="tree">
    <div class="topnode">
      <svg class="ci" viewBox="0 0 40 40" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 a6 6 0 0 1 6 6 a6 6 0 0 1 -3 10 M20 6 a6 6 0 0 0 -6 6 a6 6 0 0 0 3 10"/>
        <rect x="15" y="21" width="10" height="9" rx="2"/><path d="M17 21 v-2 M23 21 v-2"/>
        <path d="M20 30 v4 M14 34 h12"/>
      </svg>
      <div class="tt">ChatGPTエージェントでできること</div>
    </div>

    <svg class="connect" viewBox="0 0 1488 64" preserveAspectRatio="none">
      <path d="M744 0 C744 32 177 20 177 62" stroke="#ADC3FF" stroke-width="2.5" fill="none"/>
      <path d="M744 0 C744 32 555 20 555 62" stroke="#ADC3FF" stroke-width="2.5" fill="none"/>
      <path d="M744 0 C744 32 933 20 933 62" stroke="#ADC3FF" stroke-width="2.5" fill="none"/>
      <path d="M744 0 C744 32 1311 20 1311 62" stroke="#ADC3FF" stroke-width="2.5" fill="none"/>
      <circle cx="744" cy="2" r="4" fill="#366EFF"/>
      <circle cx="177" cy="62" r="4" fill="#366EFF"/><circle cx="555" cy="62" r="4" fill="#366EFF"/>
      <circle cx="933" cy="62" r="4" fill="#366EFF"/><circle cx="1311" cy="62" r="4" fill="#366EFF"/>
    </svg>

    <div class="branches">
      <div class="b">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="#366EFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16" y1="16" x2="21" y2="21"/></svg></div>
        <div class="verb">調べる</div>
        <div class="role">情報収集・調査</div>
        <div class="ex"><b>Web横断の競合調査</b><br>複数サイトから情報収集</div>
      </div>
      <div class="b">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="#366EFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg></div>
        <div class="verb">作る</div>
        <div class="role">成果物の生成</div>
        <div class="ex"><b>スライド・表・レポート</b><br>を一気通貫で作成</div>
      </div>
      <div class="b">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="#366EFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 15 l-2.5 2.5 a3.5 3.5 0 0 1 -5 -5 L4 10"/><path d="M15 9 l2.5 -2.5 a3.5 3.5 0 0 1 5 5 L20 14"/><line x1="9.5" y1="14.5" x2="14.5" y2="9.5"/></svg></div>
        <div class="verb">つなぐ</div>
        <div class="role">外部データ連携</div>
        <div class="ex"><b>Google Drive等の</b><br>外部データ・アプリ連携</div>
      </div>
      <div class="b">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="#366EFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><polyline points="7,9 10,12 7,15"/><line x1="13" y1="15" x2="17" y2="15"/></svg></div>
        <div class="verb">実行する</div>
        <div class="role">コード実行・分析</div>
        <div class="ex"><b>仮想PCでコード実行</b><br>データ分析・集計</div>
      </div>
    </div>

    <div class="foot">各機能には<b>実行回数の上限や精度のばらつき</b>があり、鵜呑みにできる場面と人の確認が要る場面の見分けが要る</div>
  </div>

  <div class="brandbar">
    <div class="tag">AIを会社のOSにする。</div>
    <img class="logo" src="PolarisX_wordmark.svg" alt="PolarisX">
  </div>
</body></html>
