<!-- style: flat + R3 illustration (gpt-image-2 文字なし下絵) + HTML labels -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  :root{
    --bg:#F7F8FB; --card:#FFFFFF; --border:#E2E5EE;
    --ink:#00063D; --body:#363C4D; --muted:#6B7388; --faint:#9AA1B5;
    --accent:#366EFF; --accent-d:#1841B8; --accent-bg:#EAF0FF; --accent-bd:#ADC3FF;
    --deep:#000985; --neutral:#EFF1F6; --neutral-ink:#5A6178;
    --sans:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1600px; height:900px; }
  body {
    font-family:var(--sans); background:var(--bg); color:var(--ink);
    padding:40px 56px 24px; display:flex; flex-direction:column;
  }
  .title { font-size:46px; font-weight:800; letter-spacing:-.02em; }
  .title .em { color:var(--accent); }
  .sub { font-size:23px; color:var(--muted); margin-top:10px; }

  .stage { flex:1; display:grid; grid-template-columns:1fr 96px 1fr; align-items:stretch; margin-top:20px; }

  .card { border-radius:22px; display:flex; flex-direction:column; overflow:hidden;
          box-shadow:0 8px 26px rgba(0,9,133,.06); background:var(--card); }
  .card.chat { border:2px solid var(--border); }
  .card.agent { border:2px solid var(--accent); }

  /* R3下絵（文字なし）を敷く。cover・中央寄せ */
  .illus { height:396px; background-size:cover; background-position:center; background-repeat:no-repeat; flex-shrink:0; }
  .card.chat  .illus { background-image:url(fig1-illus-chat.png);  border-bottom:1px solid var(--border); }
  .card.agent .illus { background-image:url(fig1-illus-agent.png); border-bottom:1px solid #CFE0FF; }

  .body { padding:20px 30px 22px; display:flex; flex-direction:column; flex:1; }
  .badge { align-self:flex-start; font-size:21px; font-weight:800; border-radius:999px; padding:6px 18px; letter-spacing:.01em; }
  .card.chat  .badge { color:var(--neutral-ink); background:var(--neutral); }
  .card.agent .badge { color:#fff; background:var(--accent); }
  .cname { font-size:29px; font-weight:800; margin-top:12px; letter-spacing:-.01em; }
  .card.chat  .cname { color:var(--ink); }
  .card.agent .cname { color:var(--accent-d); }
  .cname small { font-size:18px; font-weight:700; color:var(--muted); margin-left:6px; }

  .pts { margin-top:14px; display:flex; flex-direction:column; gap:10px; }
  .pt { display:flex; align-items:flex-start; gap:11px; font-size:22px; font-weight:600; line-height:1.35; color:var(--body); }
  .pt .ic { width:26px; height:26px; flex-shrink:0; margin-top:1px; }
  .pt b { font-weight:800; color:var(--ink); }
  .card.agent .pt b { color:var(--accent-d); }

  /* 中央の対比軸 */
  .axis { grid-column:2; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
  .axis .line { position:absolute; top:20px; bottom:20px; width:2px; background:repeating-linear-gradient(180deg,var(--accent-bd) 0 8px,transparent 8px 16px); }
  .axis .chip { position:relative; z-index:2; background:var(--deep); color:#fff; font-size:20px; font-weight:800;
                border-radius:999px; padding:16px 6px; writing-mode:vertical-rl; letter-spacing:.12em; box-shadow:0 8px 20px rgba(0,9,133,.25); }

  .brandbar { flex-shrink:0; margin-top:16px; padding-top:14px; border-top:1px solid var(--border);
              display:flex; align-items:center; justify-content:space-between; }
  .brandbar .tag { font-size:22px; color:var(--muted); font-weight:600; letter-spacing:.02em; }
  .brandbar .logo { height:38px; width:auto; opacity:.95; }
</style></head>
<body>
  <div class="title">通常のチャットと<span class="em">エージェントモード</span>の違い</div>
  <div class="sub">分かれ目は「回答するAI」か「実行するAI」か——同じChatGPTでも役割が変わる</div>

  <div class="stage">
    <!-- 左: チャット -->
    <div class="card chat">
      <div class="illus"></div>
      <div class="body">
        <span class="badge">回答するAI</span>
        <div class="cname">通常のChatGPT<small>（チャット）</small></div>
        <div class="pts">
          <div class="pt"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#6B7388" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6 h18 a1 1 0 0 1 1 1 v9 a1 1 0 0 1 -1 1 h-11 l-5 4 v-4 h-2 a1 1 0 0 1 -1 -1 v-9 a1 1 0 0 1 1 -1z"/></svg><div><b>一問一答</b>で文章の答えを返す</div></div>
          <div class="pt"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#6B7388" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11 V6 a3 3 0 0 1 6 0 v5"/><path d="M6 11 h12 l1 9 a2 2 0 0 1 -2 2 H7 a2 2 0 0 1 -2 -2z"/></svg><div>実際に<b>手を動かすのは人</b></div></div>
          <div class="pt"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#6B7388" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21 v-1 a8 8 0 0 1 16 0 v1"/></svg><div>ふだんの調べ物・<b>相談相手</b>に</div></div>
        </div>
      </div>
    </div>

    <!-- 中央軸 -->
    <div class="axis">
      <div class="line"></div>
      <div class="chip">「回答」か「実行」か</div>
    </div>

    <!-- 右: エージェント -->
    <div class="card agent">
      <div class="illus"></div>
      <div class="body">
        <span class="badge">実行するAI</span>
        <div class="cname">エージェントモード</div>
        <div class="pts">
          <div class="pt"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#1841B8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2 v3 M12 19 v3 M2 12 h3 M19 12 h3 M5 5 l2 2 M17 17 l2 2 M19 5 l-2 2 M7 17 l-2 2"/></svg><div>目的を渡すと<b>自律実行</b></div></div>
          <div class="pt"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#1841B8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><line x1="3" y1="8" x2="21" y2="8"/><path d="M8 21 h8"/></svg><div><b>ブラウザ操作・コード実行・成果物生成</b></div></div>
          <div class="pt"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#1841B8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11 l3 3 l8 -8"/><path d="M20 12 v6 a2 2 0 0 1 -2 2 H6 a2 2 0 0 1 -2 -2 V6 a2 2 0 0 1 2 -2 h9"/></svg><div>作業を任せられる<b>担当者</b>に</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="brandbar">
    <div class="tag">AIを会社のOSにする。</div>
    <img class="logo" src="PolarisX_wordmark.svg" alt="PolarisX">
  </div>
</body></html>
