<!-- style: flat + R2（3観点×3状態の信号。赤=形骸化サインのみ #E0405E） -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  :root{
    --bg:#F7F8FB; --card:#FFFFFF; --border:#E2E5EE;
    --ink:#00063D; --body:#363C4D; --muted:#6B7388;
    --accent:#366EFF; --accent-d:#1841B8; --accent-bg:#EAF0FF; --accent-bd:#ADC3FF;
    --warn:#E8A13D; --warn-bg:#FBF3E3; --bad:#E0405E; --bad-bg:#FBECEC;
    --sans:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:1024px; }
  body { font-family:var(--sans); background:var(--bg); color:var(--ink);
         padding:44px 56px 28px; display:flex; flex-direction:column; }
  .title { font-size:42px; font-weight:800; letter-spacing:-.01em; }
  .title .em { color:var(--bad); }

  .legend { display:flex; gap:26px; margin-top:16px; }
  .lg { display:flex; align-items:center; gap:10px; font-size:26px; font-weight:800; }
  .lg .dot { width:20px; height:20px; border-radius:50%; }
  .lg.ok .dot{ background:var(--accent); } .lg.ok{ color:var(--accent-d); }
  .lg.mid .dot{ background:var(--warn); } .lg.mid{ color:#9A6A1B; }
  .lg.ng .dot{ background:var(--bad); } .lg.ng{ color:#B22745; }

  .sections { flex:1; display:flex; flex-direction:column; justify-content:center; gap:20px; margin-top:12px; }
  .sec { background:var(--card); border:1.5px solid var(--border); border-radius:16px; padding:20px 24px; }
  .sec h3 { font-size:34px; font-weight:800; margin-bottom:14px; }
  .chips { display:flex; gap:14px; }
  .chip { flex:1; border-radius:10px; padding:16px 14px; font-size:27px; font-weight:700; text-align:center; line-height:1.3; }
  .chip.ok  { background:var(--accent-bg); color:var(--accent-d); border:1.5px solid var(--accent-bd); }
  .chip.mid { background:var(--warn-bg); color:#9A6A1B; border:1.5px solid #EBD3A8; }
  .chip.ng  { background:var(--bad-bg); color:#B22745; border:1.5px solid #F2C7CE; }

  .verdict { margin-top:16px; background:var(--accent-bg); border:1px solid var(--accent-bd); border-radius:12px;
             padding:18px 24px; font-size:24px; font-weight:700; color:var(--body); line-height:1.5; }
  .verdict b { color:var(--accent-d); }

  .brandbar { flex-shrink:0; margin-top:14px; padding-top:14px; border-top:1px solid var(--border);
              display:flex; align-items:center; justify-content:space-between; }
  .brandbar .tag { font-size:19px; color:var(--muted); font-weight:600; letter-spacing:.02em; }
  .brandbar .logo { height:32px; width:auto; opacity:.95; }
</style></head>
<body>
  <div class="title">機能するか、<span class="em">形骸化するか</span></div>
  <div class="legend">
    <div class="lg ok"><span class="dot"></span>機能する</div>
    <div class="lg mid"><span class="dot"></span>条件つき</div>
    <div class="lg ng"><span class="dot"></span>形骸化のサイン</div>
  </div>

  <div class="sections">
    <div class="sec">
      <h3>ナレッジ整備</h3>
      <div class="chips">
        <div class="chip ok">上位20件が文書化済み</div>
        <div class="chip mid">半分程度は整備済み</div>
        <div class="chip ng">ほぼ未整備・古いまま</div>
      </div>
    </div>
    <div class="sec">
      <h3>エスカレーション設計</h3>
      <div class="chips">
        <div class="chip ok">引き継ぎ先を先に決定</div>
        <div class="chip mid">あるが手動運用</div>
        <div class="chip ng">設計なし・たらい回し</div>
      </div>
    </div>
    <div class="sec">
      <h3>セキュリティ設計</h3>
      <div class="chips">
        <div class="chip ok">参照範囲・権限を選定済み</div>
        <div class="chip mid">範囲が未整理</div>
        <div class="chip ng">決めずに範囲を拡大</div>
      </div>
    </div>
  </div>

  <div class="verdict"><b>判定のサイン:</b> 導入2〜3か月でエスカレーション率が下がらない・誤答が続く＝原因はナレッジ側。乗り換えではなくFAQ更新に工数を振る。</div>

  <div class="brandbar">
    <div class="tag">AIを会社のOSにする。</div>
    <img class="logo" src="../../../brand/PolarisX_wordmark.svg" alt="PolarisX">
  </div>
</body></html>
