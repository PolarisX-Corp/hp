<!-- style: flat + R2 pictogram（判定条件×2状態の比較表図化） -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  :root{
    --bg:#F7F8FB; --card:#FFFFFF; --border:#E2E5EE;
    --ink:#00063D; --body:#363C4D; --muted:#6B7388;
    --accent:#366EFF; --accent-d:#1841B8; --accent-bg:#EAF0FF; --accent-bd:#ADC3FF;
    --sans:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:1024px; }
  body { font-family:var(--sans); background:var(--bg); color:var(--ink);
         padding:44px 52px 28px; display:flex; flex-direction:column; }
  .title { font-size:38px; font-weight:800; letter-spacing:-.01em; }
  .title .em { color:var(--accent); }

  .head { display:grid; grid-template-columns:250px 1fr 1fr; gap:10px; margin-top:16px; }
  .head div { border-radius:10px; padding:12px; text-align:center; font-size:26px; font-weight:800; }
  .head .fit { background:var(--accent); color:#fff; }
  .head .wait { background:#E9ECF4; color:var(--body); }

  .rows { flex:1; display:flex; flex-direction:column; justify-content:space-evenly; gap:12px; margin-top:8px; }
  .row { display:grid; grid-template-columns:250px 1fr 1fr; gap:12px; align-items:stretch; }
  .cond { background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:14px 16px;
          display:flex; align-items:center; gap:12px; }
  .cond .ico { width:36px; height:36px; flex-shrink:0; }
  .cond h3 { font-size:24px; font-weight:800; line-height:1.25; }

  .cell { border-radius:14px; padding:14px 18px; display:flex; align-items:center; gap:12px;
          font-size:26px; line-height:1.3; font-weight:700; color:var(--body); }
  .cell.fit { background:#FDFEFF; border:1.5px solid var(--accent-bd); }
  .cell.wait { background:#F4F5F9; border:1.5px solid var(--border); }
  .mark { flex-shrink:0; width:32px; height:32px; border-radius:50%; display:flex; align-items:center;
          justify-content:center; font-size:19px; font-weight:800; }
  .mark.o { background:var(--accent-bg); color:var(--accent-d); border:2px solid var(--accent); }
  .mark.t { background:#fff; color:var(--muted); border:2px solid #C6CBDA; }

  .brandbar { flex-shrink:0; margin-top:14px; padding-top:12px; border-top:1px solid var(--border);
              display:flex; align-items:center; justify-content:space-between; }
  .brandbar .tag { font-size:18px; color:var(--muted); font-weight:600; letter-spacing:.02em; }
  .brandbar .logo { height:30px; width:auto; opacity:.95; }
</style></head>
<body>
  <div class="title">自社に必要か — <span class="em">条件で判定</span></div>

  <div class="head">
    <div></div>
    <div class="fit">向いている</div>
    <div class="wait">先にやることがある</div>
  </div>

  <div class="rows">
    <div class="row">
      <div class="cond"><svg class="ico" viewBox="0 0 36 36"><rect x="4" y="20" width="7" height="12" rx="2" fill="#ADC3FF"/><rect x="14" y="12" width="7" height="20" rx="2" fill="#366EFF"/><rect x="24" y="5" width="7" height="27" rx="2" fill="#1841B8"/></svg><h3>定型問い合わせの量</h3></div>
      <div class="cell fit"><div class="mark o">○</div>月に数十件以上</div>
      <div class="cell wait"><div class="mark t">△</div>月に数件のみ</div>
    </div>
    <div class="row">
      <div class="cond"><svg class="ico" viewBox="0 0 36 36"><rect x="6" y="4" width="24" height="28" rx="3" fill="#EAF0FF" stroke="#366EFF" stroke-width="2.5"/><path d="M11 12 h14 M11 18 h14 M11 24 h8" stroke="#366EFF" stroke-width="2.5" stroke-linecap="round"/></svg><h3>答えの文書化しやすさ</h3></div>
      <div class="cell fit"><div class="mark o">○</div>手続き・使い方が中心</div>
      <div class="cell wait"><div class="mark t">△</div>個別判断・交渉が中心</div>
    </div>
    <div class="row">
      <div class="cond"><svg class="ico" viewBox="0 0 36 36"><circle cx="18" cy="18" r="12" fill="none" stroke="#366EFF" stroke-width="2.5"/><circle cx="18" cy="18" r="5" fill="#366EFF"/><path d="M18 2 v5 M18 29 v5 M2 18 h5 M29 18 h5" stroke="#1841B8" stroke-width="2.5" stroke-linecap="round"/></svg><h3>ナレッジの整備度</h3></div>
      <div class="cell fit"><div class="mark o">○</div>上位20件が読める形で存在</div>
      <div class="cell wait"><div class="mark t">△</div>ほぼ未整備。棚卸しが先</div>
    </div>
    <div class="row">
      <div class="cond"><svg class="ico" viewBox="0 0 36 36"><circle cx="13" cy="10" r="5" fill="#366EFF"/><path d="M4 30 c0-7 4-11 9-11 s9 4 9 11" fill="#EAF0FF" stroke="#366EFF" stroke-width="2.5"/><path d="M25 8 l3 3 6-6" fill="none" stroke="#1841B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg><h3>一次対応の負荷</h3></div>
      <div class="cell fit"><div class="mark o">○</div>割り込みが本業を止める</div>
      <div class="cell wait"><div class="mark t">△</div>現状の有人対応で十分</div>
    </div>
    <div class="row">
      <div class="cond"><svg class="ico" viewBox="0 0 36 36"><path d="M18 3 l12 5 v8 c0 8-5 14-12 17 -7-3-12-9-12-17 v-8 z" fill="#EAF0FF" stroke="#366EFF" stroke-width="2.5"/><path d="M12 18 l4 4 8-8" fill="none" stroke="#1841B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg><h3>セキュリティ要件</h3></div>
      <div class="cell fit"><div class="mark o">○</div>参照範囲・権限を決められる</div>
      <div class="cell wait"><div class="mark t">△</div>機密情報の扱いが未整理</div>
    </div>
  </div>

  <div class="brandbar">
    <div class="tag">AIを会社のOSにする。</div>
    <img class="logo" src="../../../brand/PolarisX_wordmark.svg" alt="PolarisX">
  </div>
</body></html>
