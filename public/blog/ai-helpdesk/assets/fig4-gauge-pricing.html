<!-- style: flat + R2（タイプ別の料金レンジを縦積みバーで。数字は本文・出典と一致必須） -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  :root{
    --bg:#F7F8FB; --card:#FFFFFF; --border:#E2E5EE;
    --ink:#00063D; --body:#363C4D; --muted:#6B7388;
    --accent:#366EFF; --accent-d:#1841B8; --accent-bg:#EAF0FF; --accent-bd:#ADC3FF;
    --sans:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:1024px; }
  body { font-family:var(--sans); background:var(--bg); color:var(--ink);
         padding:48px 56px 30px; display:flex; flex-direction:column; }
  .title { font-size:46px; font-weight:800; letter-spacing:-.01em; }
  .title .em { color:var(--accent); }

  .rows { flex:1; display:flex; flex-direction:column; justify-content:center; gap:30px; margin-top:16px; }
  .row { background:var(--card); border:1.5px solid var(--border); border-radius:18px;
         padding:24px 32px; box-shadow:0 2px 10px rgba(0,6,61,.05);
         display:flex; align-items:center; gap:28px; }
  .ico { flex-shrink:0; width:64px; height:64px; border-radius:16px; background:var(--accent-bg);
         display:flex; align-items:center; justify-content:center; }
  .body2 { flex:1; min-width:0; }
  .name { font-size:36px; font-weight:800; }
  .lane { position:relative; height:64px; background:#F1F3F9; border-radius:12px; margin-top:12px; }
  .range { position:absolute; top:5px; bottom:5px; border-radius:10px; display:flex; align-items:center;
           justify-content:center; font-size:36px; font-weight:800; color:#fff; white-space:nowrap; padding:0 14px; }
  .r1 { left:0%;  width:38%; background:var(--accent-bd); color:var(--accent-d); }
  .r2 { left:38%; width:34%; background:var(--accent); }
  .r3 { left:60%; width:40%; background:var(--accent-d); }

  .note { margin-top:22px; background:var(--accent-bg); border:1px solid var(--accent-bd); border-radius:12px;
          padding:16px 24px; font-size:26px; font-weight:700; color:var(--body); text-align:center; }

  .brandbar { flex-shrink:0; margin-top:22px; padding-top:16px; border-top:1px solid var(--border);
              display:flex; align-items:center; justify-content:space-between; }
  .brandbar .tag { font-size:20px; color:var(--muted); font-weight:600; letter-spacing:.02em; }
  .brandbar .logo { height:34px; width:auto; opacity:.95; }
</style></head>
<body>
  <div class="title">料金は<span class="em">タイプで決まる</span></div>

  <div class="rows">
    <div class="row">
      <div class="ico"><svg width="34" height="34" viewBox="0 0 34 34"><rect x="3" y="7" width="28" height="20" rx="3" fill="none" stroke="#366EFF" stroke-width="2.5"/><path d="M3 13 h28" stroke="#366EFF" stroke-width="2.5"/><rect x="7" y="17" width="8" height="5" rx="1" fill="#ADC3FF"/></svg></div>
      <div class="body2">
        <div class="name">シナリオ型</div>
        <div class="lane"><div class="range r1">数千円〜5万円</div></div>
      </div>
    </div>
    <div class="row">
      <div class="ico"><svg width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="12" r="6" fill="none" stroke="#366EFF" stroke-width="2.5"/><path d="M6 29 c0-7 5-11 11-11 s11 4 11 11" fill="none" stroke="#366EFF" stroke-width="2.5"/></svg></div>
      <div class="body2">
        <div class="name">AI搭載型</div>
        <div class="lane"><div class="range r2">10万〜50万円</div></div>
      </div>
    </div>
    <div class="row">
      <div class="ico"><svg width="34" height="34" viewBox="0 0 34 34"><rect x="4" y="4" width="26" height="26" rx="6" fill="none" stroke="#366EFF" stroke-width="2.5"/><path d="M11 17 l4 4 8-8" fill="none" stroke="#1841B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="body2">
        <div class="name">生成AI・RAG型</div>
        <div class="lane"><div class="range r3">15万〜50万円〜</div></div>
      </div>
    </div>
  </div>

  <div class="note">執筆時点（2026年7月）の報告値の目安。個別見積もりで要確認</div>

  <div class="brandbar">
    <div class="tag">AIを会社のOSにする。</div>
    <img class="logo" src="../../../brand/PolarisX_wordmark.svg" alt="PolarisX">
  </div>
</body></html>
