<!-- style: flat + illust（R3-compose: codex/gpt-image-2 の文字なし下絵 fig3-illus-calls.png をヘッダー帯に敷く。和文はHTML合成・数字は出典と一致必須） -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  :root{
    --bg:#F7F8FB; --card:#FFFFFF; --border:#E2E5EE;
    --ink:#00063D; --body:#363C4D; --muted:#6B7388;
    --accent:#366EFF; --accent-d:#1841B8; --accent-bg:#EAF0FF; --accent-bd:#ADC3FF;
    --sans:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:1024px; }
  body { font-family:var(--sans); background:var(--bg); color:var(--ink);
         padding:40px 52px 26px; display:flex; flex-direction:column; }
  .title { font-size:34px; font-weight:800; letter-spacing:-.01em; }
  .title .em { color:var(--accent); }

  .illus { height:260px; margin-top:18px; border-radius:16px; border:1px solid var(--accent-bd);
           background:var(--accent-bg) url(fig3-illus-calls.png) center/cover no-repeat; }

  .stage { flex:1; display:flex; flex-direction:column; justify-content:space-evenly; gap:0; margin-top:10px; }
  .panel { background:var(--card); border:1.5px solid var(--border); border-radius:18px;
           padding:34px 40px; box-shadow:0 2px 8px rgba(0,6,61,.05); }
  .cap { font-size:24px; font-weight:800; color:var(--muted); letter-spacing:.02em; }
  .rows { margin-top:18px; display:flex; gap:30px; }
  .r { flex:1; }
  .r .lab { font-size:24px; font-weight:700; color:var(--body); }
  .r b { display:block; font-size:52px; font-weight:800; color:var(--ink); letter-spacing:-.01em; margin-top:6px; }
  .r b small { font-size:26px; font-weight:700; color:var(--muted); margin-left:2px; }
  .half { font-size:22px; font-weight:800; color:#B22745; margin-top:8px; }

  .midarrow { display:flex; justify-content:center; padding:10px 0; }

  .after { background:linear-gradient(180deg,#FDFEFF,var(--accent-bg)); border:2px solid var(--accent-bd); border-radius:18px;
           padding:34px 40px; display:flex; align-items:center; justify-content:space-between; gap:20px; }
  .after .cap2 { font-size:24px; font-weight:800; color:var(--accent-d); letter-spacing:.02em; }
  .after .big { font-size:56px; font-weight:800; color:var(--accent-d); margin-top:8px; }

  .src { margin-top:12px; font-size:18px; color:var(--muted); font-weight:600; }

  .brandbar { flex-shrink:0; margin-top:12px; padding-top:12px; border-top:1px solid var(--border);
              display:flex; align-items:center; justify-content:space-between; }
  .brandbar .tag { font-size:18px; color:var(--muted); font-weight:600; letter-spacing:.02em; }
  .brandbar .logo { height:30px; width:auto; opacity:.95; }
</style></head>
<body>
  <div class="title">人手の窓口には<span class="em">応答量の上限</span>がある</div>

  <div class="illus"></div>

  <div class="stage">
    <div class="panel">
      <div class="cap">導入前（2016年・電話8回線／8〜20時）</div>
      <div class="rows">
        <div class="r">
          <div class="lab">問い合わせ</div>
          <b>年間 約72,000<small>件</small></b>
        </div>
        <div class="r">
          <div class="lab">応答できた件数</div>
          <b>約36,000<small>件</small></b>
          <div class="half">約半数にとどまる</div>
        </div>
      </div>
    </div>

    <div class="midarrow">
      <svg width="40" height="40" viewBox="0 0 40 40"><path d="M20 6 v22 M10 20 l10 10 10-10" fill="none" stroke="#366EFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>

    <div class="after">
      <div>
        <div class="cap2">AIヘルプデスク導入の狙い</div>
        <div class="big">24時間365日自動応答</div>
      </div>
    </div>
  </div>

  <div class="src">出典: アサヒグループホールディングス ニュースリリース（2017年7月13日）の公表値</div>

  <div class="brandbar">
    <div class="tag">AIを会社のOSにする。</div>
    <img class="logo" src="../../../brand/PolarisX_wordmark.svg" alt="PolarisX">
  </div>
</body></html>
