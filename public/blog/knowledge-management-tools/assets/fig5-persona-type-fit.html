<!-- style: paper + R2 pictogram (case cards) -->
<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  :root{
    --bg:#FAF9F5; --card:#FFFEFB; --border:#E4E1D6; --rule:#1B2233;
    --ink:#00063D; --body:#363C4D; --muted:#6B7388;
    --accent:#366EFF; --accent-d:#1841B8; --accent-bg:#EDF2FF; --accent-bd:#ADC3FF;
    --serif:"Hiragino Mincho ProN","YuMincho","Yu Mincho",serif;
    --sans:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1600px; height:900px; }
  body { font-family:var(--sans); background:var(--bg); color:var(--ink);
         padding:42px 60px 24px; display:flex; flex-direction:column; }
  .eyebrow { font-size:19px; font-weight:800; letter-spacing:.42em; color:var(--accent-d); }
  .title { font-family:var(--serif); font-size:44px; font-weight:700; letter-spacing:.01em; margin-top:8px; }
  .title .em { color:var(--accent); border-bottom:4px solid var(--accent); padding-bottom:2px; }
  .drule { margin-top:14px; border-top:2.5px solid var(--rule); border-bottom:1px solid var(--rule); height:5px; }

  .cards { flex:1; display:grid; grid-template-columns:repeat(4,1fr); gap:22px; margin-top:20px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:4px; display:flex; flex-direction:column;
          overflow:hidden; box-shadow:3px 3px 0 rgba(27,34,51,.06); }
  .card.hot { border:1.5px solid var(--accent); box-shadow:4px 4px 0 rgba(54,110,255,.16); }
  .chead { flex:1; padding:26px 22px 20px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; border-bottom:1px dashed var(--border); }
  .cic { width:108px; height:108px; border-radius:50%; background:var(--accent-bg); border:1px solid var(--accent-bd);
         display:flex; align-items:center; justify-content:center; }
  .cic svg { width:62px; height:62px; }
  .quote { font-family:var(--serif); font-size:23px; font-weight:700; line-height:1.6; text-align:center; color:var(--ink); }
  .quote::before { content:'「'; color:var(--accent-d); }
  .quote::after { content:'」'; color:var(--accent-d); }
  .cbody { padding:16px 20px 20px; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .then { font-size:15px; font-weight:800; color:var(--muted); letter-spacing:.24em; }
  .type { width:100%; text-align:center; background:var(--accent-bg); border:1px solid var(--accent-bd); border-radius:4px;
          padding:10px 8px; font-family:var(--serif); font-size:25px; font-weight:700; color:var(--accent-d); }
  .card.hot .type { background:var(--accent); border-color:var(--accent); color:#FFFFFF; }
  .why { font-size:15.5px; color:var(--muted); font-weight:600; line-height:1.45; text-align:center; }

  .brandbar { flex-shrink:0; margin-top:18px; padding-top:13px; border-top:1px solid var(--border);
              display:flex; align-items:center; justify-content:space-between; }
  .brandbar .tag { font-size:21px; color:var(--muted); font-weight:600; letter-spacing:.02em; }
  .brandbar .logo { height:36px; width:auto; opacity:.95; }
</style></head>
<body>
  <div class="eyebrow">ケース別診断</div>
  <div class="title">「まず何を解決したいか」から<span class="em">タイプを引く</span></div>
  <div class="drule"></div>

  <div class="cards">
    <div class="card">
      <div class="chead">
        <div class="cic"><svg viewBox="0 0 24 24" fill="none" stroke="#366EFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8.5" r="3.2"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/><path d="M4 8.5a8 8 0 0 1 3-5"/><path d="M20 8.5a8 8 0 0 0-3-5"/></svg></div>
        <div class="quote">CSと総務に、同じ質問が毎日くる</div>
      </div>
      <div class="cbody">
        <div class="then">▼ 選ぶなら</div>
        <div class="type">FAQ型</div>
        <div class="why">頻出質問の上位からQ&A化。効果は問い合わせ件数で測れる</div>
      </div>
    </div>

    <div class="card">
      <div class="chead">
        <div class="cic"><svg viewBox="0 0 24 24" fill="none" stroke="#366EFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7.5" r="3"/><path d="M6 20a6 6 0 0 1 12 0"/><path d="M12 2v1M17.5 4.5l-.8.8M6.5 4.5l.8.8"/></svg></div>
        <div class="quote">ノウハウがエースの頭の中にしかない</div>
      </div>
      <div class="cbody">
        <div class="then">▼ 選ぶなら</div>
        <div class="type">社内Wiki型</div>
        <div class="why">書き込みハードルの低さ優先で、まず「書かれる」文化を作る</div>
      </div>
    </div>

    <div class="card">
      <div class="chead">
        <div class="cic"><svg viewBox="0 0 24 24" fill="none" stroke="#366EFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l4 4v14H6z"/><path d="M15 3v4h4"/><circle cx="12" cy="13" r="2.6"/><path d="M12 15.6V19M10 18l2 1.5L14 18"/></svg></div>
        <div class="quote">契約書・規程の「最新版」が分からない</div>
      </div>
      <div class="cbody">
        <div class="then">▼ 選ぶなら</div>
        <div class="type">ドキュメント管理型</div>
        <div class="why">版管理・承認・権限の統制が目的なら、Wiki型で代用しない</div>
      </div>
    </div>

    <div class="card hot">
      <div class="chead">
        <div class="cic"><svg viewBox="0 0 24 24" fill="none" stroke="#1841B8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="9" width="14" height="10" rx="2.5"/><circle cx="9.5" cy="13.5" r="1" fill="#1841B8"/><circle cx="14.5" cy="13.5" r="1" fill="#1841B8"/><path d="M12 9V6"/><circle cx="12" cy="5" r="1.2"/><path d="M2.5 13.5H5M19 13.5h2.5"/></svg></div>
        <div class="quote">社内のことをAIに聞ける状態にしたい</div>
      </div>
      <div class="cbody">
        <div class="then">▼ 選ぶなら</div>
        <div class="type">AI・RAG型</div>
        <div class="why">既存文書を活かしてAIに接続。司令塔AI社員への発展もこの延長</div>
      </div>
    </div>
  </div>

  <div class="brandbar">
    <div class="tag">AIを会社のOSにする。</div>
    <img class="logo" src="../../../brand/PolarisX_wordmark.svg" alt="PolarisX">
  </div>
</body></html>
